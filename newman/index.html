<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirati Suwanpusit | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 50px 0;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .major-tag {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
            text-align: left;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
        }

        .info-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .info-value {
            font-weight: 500;
            font-size: 1rem;
        }

        .social-links {
            margin-top: 30px;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 1.5rem;
            margin: 0 15px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--accent-color);
        }

        /* สำหรับปุ่มจำลองการทำงานของ GitHub */
        .btn-tech {
            background: var(--accent-color);
            color: #000;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 25px;
            margin-top: 20px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="profile-card">
                <img src="https://sojjyuu.github.io/your-profile-pic.jpg" alt="Kirati" class="profile-img">
                
                <h1>Kirati Suwanpusit</h1>
                <span class="major-tag">Computer Information Science, KKU</span>
                
                <p style="color: var(--text-muted);">
                    Passionate about Software Development and Data Analysis. 
                    Currently exploring Web Technologies and Automated Testing.
                </p>

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-id-badge"></i> Student ID</span>
                        <span class="info-value">663450172-5</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-envelope"></i> Email</span>
                        <span class="info-value">Kirati.su@kkumail.com</span>
                    </div>
                </div>

                <div class="social-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>

                <a href="https://github.com/sojjyuu" class="btn btn-tech">View My Projects</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
